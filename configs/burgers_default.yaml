domain:
  x_min: 0.0
  x_max: 6.283185307179586  # 2*pi
  nx_coarse: 64
  nx_fine: 256

physics:
  nu: 0.01

time:
  t_end: 1.0
  cfl: 0.5
  dt_max: 0.001

scheme:
  advection: "upwind"
  diffusion: "central"
  time_integrator: "rk2"

initial_condition:
  type: "sine_sum"
  params:
    n_modes: 3
    amplitude_range: [0.5, 1.5]
    seed: 42
